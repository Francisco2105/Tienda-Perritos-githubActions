name: CI/CD Tienda Perritos - Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Se actualiza a v2 y se le añade un 'id' para capturar la URL automáticamente
    - name: Login en Amazon ECR (runner)
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build imagen Backend y push a ECR
      run: |
        cd backend
        # Usamos la URL que AWS nos da automáticamente + el nombre de tu repo
        docker build -t ${{ steps.login-ecr.outputs.registry }}/tienda-backend:latest .
        docker push ${{ steps.login-ecr.outputs.registry }}/tienda-backend:latest

    - name: Desplegar Backend vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Actualizar tienda-backend desde ECR" \
          --parameters '{"commands":[
            "set -e",
            "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}",
            "docker pull ${{ steps.login-ecr.outputs.registry }}/tienda-backend:latest",
            "docker stop tienda-backend || true",
            "docker rm tienda-backend || true",
            "docker run -d --name tienda-backend -p 3001:3001 ${{ steps.login-ecr.outputs.registry }}/tienda-backend:latest"
          ]}' \
          --output text
